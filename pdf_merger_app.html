<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Merger</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
*{box-sizing:border-box}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
padding:20px;
}

.card{
background:#fff;
width:100%;
max-width:540px;
border-radius:16px;
padding:28px;
box-shadow:0 20px 45px rgba(0,0,0,.25);
transition:all .3s ease;
}

.card:hover{
transform:translateY(-3px);
box-shadow:0 25px 50px rgba(0,0,0,.3);
}

h2{
text-align:center;
margin-top:0;
margin-bottom:20px;
color:#2c5364;
}

.drop-area{
border:2px dashed #ccc;
border-radius:12px;
padding:30px;
text-align:center;
cursor:pointer;
transition:.25s;
}

.drop-area.dragover{
border-color:#2c5364;
background:#f4f8fa;
}

input[type=file]{display:none}

.file-list{
margin-top:15px;
font-size:14px;
}

.file-item{
padding:6px 8px;
border-bottom:1px solid #eee;
}

button{
width:100%;
margin-top:18px;
padding:12px;
border:none;
border-radius:8px;
background:#2c5364;
color:white;
font-size:16px;
cursor:pointer;
transition:.25s;
}

button:hover{
background:#1f3b4a;
transform:translateY(-1px);
}

.result{
margin-top:20px;
text-align:center;
opacity:0;
transform:translateY(10px);
transition:.35s;
}

.result.show{
opacity:1;
transform:translateY(0);
}

.download-btn{
background:#27ae60;
margin-top:10px;
}

.download-btn:hover{
background:#1e874b;
}

.filename-input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:10px;
}

.note{
margin-top:10px;
font-size:12px;
color:#666;
text-align:center;
}

@media(max-width:480px){
.card{padding:22px}
}
</style>
</head>

<body>

<div class="card">

<h2>PDF Merger</h2>

<div class="drop-area" id="dropArea">
<p id="fileLabel">Drop PDFs here or click to upload</p>
<input type="file" id="fileInput" accept="application/pdf" multiple>
</div>

<div class="file-list" id="fileList"></div>

<button id="mergeBtn">Merge PDFs</button>

<div class="result" id="resultBox">

<p>Your merged PDF is ready.</p>

<label>Download file name</label>
<input id="fileNameInput" class="filename-input" value="merged.pdf">

<a id="downloadLink">
<button class="download-btn">Download PDF</button>
</a>

</div>

<p class="note">Files are processed locally in your browser. Nothing is uploaded.</p>

</div>

<script>

let selectedFiles=[];

const dropArea=document.getElementById("dropArea");
const fileInput=document.getElementById("fileInput");
const fileList=document.getElementById("fileList");

dropArea.addEventListener("click",()=>fileInput.click());

fileInput.addEventListener("change",e=>{
selectedFiles=[...e.target.files];
renderFileList();
});

dropArea.addEventListener("dragover",e=>{
e.preventDefault();
dropArea.classList.add("dragover");
});

dropArea.addEventListener("dragleave",()=>{
dropArea.classList.remove("dragover");
});

dropArea.addEventListener("drop",e=>{
e.preventDefault();
dropArea.classList.remove("dragover");

const files=[...e.dataTransfer.files].filter(f=>f.type==="application/pdf");
selectedFiles=files;
renderFileList();
});

function renderFileList(){

fileList.innerHTML="";

selectedFiles.forEach((file,index)=>{

const div=document.createElement("div");
div.className="file-item";
div.textContent=(index+1)+". "+file.name;

fileList.appendChild(div);

});

}

document.getElementById("mergeBtn").addEventListener("click",mergePDFs);

async function mergePDFs(){

if(selectedFiles.length===0){
alert("Please upload PDF files");
return;
}

const { PDFDocument } = PDFLib;
const mergedPdf = await PDFDocument.create();

for(const file of selectedFiles){

const bytes = await file.arrayBuffer();
const pdf = await PDFDocument.load(bytes);

const pages = await mergedPdf.copyPages(pdf,pdf.getPageIndices());

pages.forEach(page=>mergedPdf.addPage(page));

}

const mergedBytes = await mergedPdf.save();

const blob = new Blob([mergedBytes],{type:"application/pdf"});
const url = URL.createObjectURL(blob);

const link=document.getElementById("downloadLink");
const filename=document.getElementById("fileNameInput").value || "merged.pdf";

link.href=url;
link.download=filename.endsWith(".pdf") ? filename : filename+".pdf";

document.getElementById("resultBox").classList.add("show");

}

</script>

</body>
</html>
