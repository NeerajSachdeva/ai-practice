```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BMI Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
box-sizing:border-box;
}

body{
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
padding:20px;
}

.card{
background:white;
width:100%;
max-width:420px;
border-radius:16px;
padding:28px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
transition:transform .3s ease, box-shadow .3s ease;
}

.card:hover{
transform:translateY(-3px);
box-shadow:0 25px 45px rgba(0,0,0,0.30);
}

h2{
text-align:center;
margin-bottom:20px;
color:#2c5364;
}

label{
font-size:14px;
font-weight:600;
display:block;
margin-top:10px;
}

input, select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
transition:border .2s ease, box-shadow .2s ease;
}

input:focus, select:focus{
outline:none;
border-color:#2c5364;
box-shadow:0 0 0 2px rgba(44,83,100,.15);
}

.inline{
display:flex;
gap:10px;
align-items:center;
}

button{
width:100%;
margin-top:20px;
padding:12px;
background:#2c5364;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:all .25s ease;
}

button:hover{
background:#1f3b4a;
transform:translateY(-1px);
}

.result{
margin-top:20px;
padding:18px;
border-radius:12px;
background:#f4f7f9;
opacity:0;
transform:translateY(10px);
transition:all .4s ease;
}

.result.show{
opacity:1;
transform:translateY(0);
}

.bmi-value{
font-size:30px;
font-weight:700;
margin:8px 0;
color:#2c5364;
}

.bmi-bar{
margin-top:14px;
height:10px;
border-radius:6px;
background:linear-gradient(
to right,
#3498db 0%,
#2ecc71 35%,
#f1c40f 65%,
#e74c3c 100%
);
position:relative;
}

.bmi-indicator{
position:absolute;
top:-5px;
width:18px;
height:18px;
border-radius:50%;
background:white;
border:3px solid #2c5364;
transition:left .5s ease;
}

/* Mobile spacing */

@media(max-width:480px){

.card{
padding:22px;
}

.bmi-value{
font-size:26px;
}

}

</style>
</head>

<body>

<div class="card">

<h2>BMI Health Calculator</h2>

<label>Name</label>
<input id="name" type="text" placeholder="Enter your name">

<label>Gender</label>
<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>Weight</label>
<div class="inline">
<input id="weight" type="number" placeholder="Enter weight">
<select id="weightUnit" style="max-width:90px">
<option value="kg">kg</option>
<option value="lb">lbs</option>
</select>
</div>

<label>Height</label>
<div class="inline">

<select id="heightUnit" onchange="updateHeightFields()" style="max-width:120px">
<option value="cm">cm</option>
<option value="in">in</option>
<option value="ftin">ft+in</option>
</select>

<div id="heightCM" style="flex:1">
<input id="heightCmInput" type="number" placeholder="value">
</div>

<div id="heightIn" style="flex:1; display:none;">
<input id="heightInInput" type="number" placeholder="value">
</div>

<div id="heightFtIn" class="inline" style="flex:1; display:none;">
<input id="heightFt" type="number" placeholder="ft">
<input id="heightInches" type="number" placeholder="in">
</div>

</div>

<button onclick="calculateBMI()">Calculate BMI</button>

<div class="result" id="resultBox">

<h3 id="greeting"></h3>

<div class="bmi-value" id="bmiValue"></div>

<div id="bmiCategory"></div>

<div class="bmi-bar">
<div class="bmi-indicator" id="bmiIndicator"></div>
</div>

</div>

</div>

<script>

function updateHeightFields(){

let unit=document.getElementById("heightUnit").value;

document.getElementById("heightCM").style.display="none";
document.getElementById("heightIn").style.display="none";
document.getElementById("heightFtIn").style.display="none";

if(unit==="cm") document.getElementById("heightCM").style.display="block";
if(unit==="in") document.getElementById("heightIn").style.display="block";
if(unit==="ftin") document.getElementById("heightFtIn").style.display="flex";

}

function calculateBMI(){

let name=document.getElementById("name").value;
let gender=document.getElementById("gender").value;
let weight=parseFloat(document.getElementById("weight").value);
let weightUnit=document.getElementById("weightUnit").value;
let heightUnit=document.getElementById("heightUnit").value;

if(!name || !weight){
alert("Please complete the form");
return;
}

/* convert weight */

if(weightUnit==="lb") weight*=0.453592;

let heightMeters;

if(heightUnit==="cm")
heightMeters=document.getElementById("heightCmInput").value/100;

if(heightUnit==="in")
heightMeters=document.getElementById("heightInInput").value*0.0254;

if(heightUnit==="ftin"){
let ft=document.getElementById("heightFt").value;
let inches=document.getElementById("heightInches").value;
heightMeters=(ft*12+parseFloat(inches))*0.0254;
}

let bmi=(weight/(heightMeters*heightMeters)).toFixed(1);

let category="";

if(bmi<18.5) category="Underweight";
else if(bmi<25) category="Normal Weight";
else if(bmi<30) category="Overweight";
else category="Obese";

let genderMsg = gender==="male"
? "Healthy BMI for men is typically 18.5–24.9."
: "Healthy BMI for women is typically 18.5–24.9.";

document.getElementById("greeting").innerText="Hello "+name+"!";
document.getElementById("bmiValue").innerText="BMI: "+bmi;
document.getElementById("bmiCategory").innerText=category+" • "+genderMsg;

/* Move indicator */

let position=Math.min((bmi/40)*100,100);
document.getElementById("bmiIndicator").style.left=position+"%";

let box=document.getElementById("resultBox");
box.classList.add("show");

}

</script>

</body>
</html>
```
